<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title + description + canonical + OG/Twitter are injected per-page by
         src/components/Seo.jsx via React 19 native metadata (every route renders
         a <Seo>). Only non-varying defaults live here to avoid duplicate tags. -->
    <meta name="keywords" content="social media management, social media agency, small business marketing, short-form video, reels, content creation, Instagram management, Facebook management, LinkedIn marketing, website design, affordable social media" />
    <meta name="author" content="The Social 99" />
    <meta name="theme-color" content="#013186" />
    <meta name="msvalidate.01" content="8DF70DCC52CED642D9FD2363D4B81543" />

    <!-- Google tag (gtag.js) — GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WR65Q39ZCG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WR65Q39ZCG');
    </script>

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Static Open Graph (non-varying) -->
    <meta property="og:site_name" content="The Social 99" />
    <meta property="og:image:alt" content="The Social 99 logo" />
    <meta property="og:locale" content="en_US" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts asynchronously so they don't block first paint -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "The Social 99",
      "alternateName": "TheSocial99",
      "url": "https://thesocial99.com/",
      "logo": "https://thesocial99.com/Logo@2x.png",
      "description": "Affordable social media management agency helping small businesses grow with custom content, expert management, and short-form video. Plans start at $99/month.",
      "email": "support@thesocial99.com",
      "sameAs": [
        "https://www.facebook.com/thesocial99",
        "https://www.instagram.com/thesocial99",
        "https://www.linkedin.com/company/thesocial99"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@thesocial99.com",
        "contactType": "customer support",
        "availableLanguage": ["English"]
      }
    }
    </script>

    <!-- Structured Data: WebSite (with sitelinks search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "The Social 99",
      "url": "https://thesocial99.com/",
      "publisher": { "@type": "Organization", "name": "The Social 99" }
    }
    </script>

    <!-- Structured Data: Professional Service + Offers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "The Social 99",
      "image": "https://thesocial99.com/Logo@2x.png",
      "url": "https://thesocial99.com/",
      "priceRange": "$99 - $299 / month",
      "description": "Done-for-you social media management, short-form video creation, and website design for small businesses.",
      "areaServed": "US",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Social Media Management Plans",
        "itemListElement": [
          {
            "@type": "Offer",
            "name": "Starter",
            "price": "99",
            "priceCurrency": "USD",
            "url": "https://thesocial99.com/pricing",
            "itemOffered": { "@type": "Service", "name": "Starter Social Media Management" }
          },
          {
            "@type": "Offer",
            "name": "Growth",
            "price": "199",
            "priceCurrency": "USD",
            "url": "https://thesocial99.com/pricing",
            "itemOffered": { "@type": "Service", "name": "Growth Social Media Management" }
          },
          {
            "@type": "Offer",
            "name": "Pro",
            "price": "299",
            "priceCurrency": "USD",
            "url": "https://thesocial99.com/pricing",
            "itemOffered": { "@type": "Service", "name": "Pro Social Media Management" }
          }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
